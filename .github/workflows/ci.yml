name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  site:
    name: Site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: Site

      - name: Check generated site content
        run: npm run check
        working-directory: Site

      - name: Build site
        run: npm run build
        working-directory: Site

  swift:
    name: Swift
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Swift package
        timeout-minutes: 15
        run: make build

      - name: Run public contract checks
        timeout-minutes: 10
        run: make public-check PUBLIC_CHECK_TEST=0
